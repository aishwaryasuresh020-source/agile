apiVersion: apps/v1
kind: Deployment
metadata:
  name: password-reset-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: password-reset

  template:
    metadata:
      labels:
        app: password-reset

    spec:
      containers:
      - name: password-reset-container
        image: yourdockerhubusername/password-reset-app:latest
---
apiVersion: v1
kind: Service
metadata:
  name: password-reset-service

spec:
  type: NodePort

  selector:
    app: password-reset

  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30011